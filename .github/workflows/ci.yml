name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend quality and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: accessiq
          POSTGRES_USER: accessiq
          POSTGRES_PASSWORD: accessiq
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U accessiq -d accessiq"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://accessiq:accessiq@localhost:5432/accessiq
      JWT_SECRET: ci-accessiq-secret-minimum-32-bytes
      AI_ENABLED: "true"
      LLM_PROVIDER: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Black format check
        run: black --check app tests

      - name: MyPy type check
        run: mypy

      - name: Backend tests
        run: |
          mkdir -p reports
          pytest -vv --junitxml=reports/backend-pytest.xml

      - name: Upload backend test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-pytest-report
          path: reports/backend-pytest.xml
          if-no-files-found: ignore

  frontend-quality:
    name: Frontend quality and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

      - name: TypeScript validation
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Frontend production build
        run: npm run build

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --pull -t accessiq-api:ci .

      - name: Build frontend image
        run: docker build --pull -t accessiq-frontend:ci frontend

      - name: Container vulnerability scan
        run: bash scripts/container-scan.sh accessiq-api:ci accessiq-frontend:ci

      - name: Upload container security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-security-reports
          path: |
            reports/security
            sbom/*image.cdx.json
          if-no-files-found: ignore

  kubernetes-quality:
    name: Kubernetes and Helm validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.4

      - name: Set up kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: accessiq-ci
          wait: 60s

      - name: Helm lint
        run: helm lint helm/accessiq

      - name: Render development manifests
        run: helm template accessiq helm/accessiq -f helm/accessiq/values-dev.yaml > rendered-dev.yaml

      - name: Validate development manifests
        run: kubectl apply --dry-run=client -f rendered-dev.yaml

      - name: Render production manifests
        run: helm template accessiq helm/accessiq -f helm/accessiq/values-prod.yaml > rendered-prod.yaml

      - name: Validate production manifests
        run: kubectl apply --dry-run=client -f rendered-prod.yaml

  dependency-security:
    name: Dependency security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Python dependency audit
        run: bash scripts/python-dependency-audit.sh

      - name: Install SBOM generator
        run: python -m pip install cyclonedx-bom

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: JavaScript dependency audit
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Secret scan
        run: bash scripts/secret-scan.sh

      - name: Generate application SBOMs
        run: bash scripts/generate-sbom.sh

      - name: Upload application SBOMs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-sboms
          path: sbom
          if-no-files-found: ignore
