services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://accessiq:accessiq@db:5432/accessiq}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: accessiq
      POSTGRES_USER: accessiq
      POSTGRES_PASSWORD: accessiq
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
