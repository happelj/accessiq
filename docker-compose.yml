services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://accessiq:accessiq@db:5432/accessiq}
      JWT_SECRET: ${JWT_SECRET:-dev-accessiq-change-me-minimum-32-bytes}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      AI_ENABLED: ${AI_ENABLED:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      AI_TIMEOUT: ${AI_TIMEOUT:-30}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1200}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-sonnet-latest}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
      ACCESSIQ_METRICS_ENABLED: ${ACCESSIQ_METRICS_ENABLED:-true}
      ACCESSIQ_TRACING_ENABLED: ${ACCESSIQ_TRACING_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-accessiq-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: accessiq
      POSTGRES_USER: accessiq
      POSTGRES_PASSWORD: accessiq
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accessiq -d accessiq"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  frontend_node_modules:
