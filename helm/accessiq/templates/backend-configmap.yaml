apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "accessiq.backendConfigMapName" . }}
  namespace: {{ include "accessiq.namespace" . }}
  labels:
    {{- include "accessiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  DATABASE_POOL_PRE_PING: {{ .Values.backend.config.databasePoolPrePing | quote }}
  DATABASE_POOL_SIZE: {{ .Values.backend.config.databasePoolSize | quote }}
  DATABASE_MAX_OVERFLOW: {{ .Values.backend.config.databaseMaxOverflow | quote }}
  DATABASE_POOL_TIMEOUT: {{ .Values.backend.config.databasePoolTimeout | quote }}
  DATABASE_POOL_RECYCLE_SECONDS: {{ .Values.backend.config.databasePoolRecycleSeconds | quote }}
  JWT_ALGORITHM: {{ .Values.backend.config.jwtAlgorithm | quote }}
  ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.backend.config.accessTokenExpireMinutes | quote }}
  AI_ENABLED: {{ .Values.backend.config.aiEnabled | quote }}
  LLM_PROVIDER: {{ .Values.backend.config.llmProvider | quote }}
  AI_TIMEOUT: {{ .Values.backend.config.aiTimeout | quote }}
  AI_MAX_TOKENS: {{ .Values.backend.config.aiMaxTokens | quote }}
  OPENAI_MODEL: {{ .Values.backend.config.openaiModel | quote }}
  ANTHROPIC_MODEL: {{ .Values.backend.config.anthropicModel | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.backend.config.corsAllowedOrigins | quote }}
  CORS_ALLOW_CREDENTIALS: {{ .Values.backend.config.corsAllowCredentials | quote }}
  ACCESSIQ_LOGGER_NAME: {{ .Values.backend.config.accessiqLoggerName | quote }}
  ACCESSIQ_LOG_LEVEL: {{ .Values.backend.config.accessiqLogLevel | quote }}
  ACCESSIQ_METRICS_ENABLED: {{ .Values.backend.config.accessiqMetricsEnabled | quote }}
  ACCESSIQ_TRACING_ENABLED: {{ .Values.backend.config.accessiqTracingEnabled | quote }}
  OTEL_SERVICE_NAME: {{ .Values.backend.config.otelServiceName | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.backend.config.otelExporterOtlpEndpoint | quote }}
  ENABLE_SALESFORCE_CONNECTOR: {{ .Values.backend.config.connectors.salesforce.enabled | quote }}
  ENABLE_GITHUB_CONNECTOR: {{ .Values.backend.config.connectors.github.enabled | quote }}
  ENABLE_ZENDESK_CONNECTOR: {{ .Values.backend.config.connectors.zendesk.enabled | quote }}
  ENABLE_FINANCE_CONNECTOR: {{ .Values.backend.config.connectors.finance.enabled | quote }}
  SALESFORCE_API_BASE_URL: {{ .Values.backend.config.connectors.salesforce.apiBaseUrl | quote }}
  GITHUB_API_BASE_URL: {{ .Values.backend.config.connectors.github.apiBaseUrl | quote }}
  ZENDESK_API_BASE_URL: {{ .Values.backend.config.connectors.zendesk.apiBaseUrl | quote }}
  FINANCE_API_BASE_URL: {{ .Values.backend.config.connectors.finance.apiBaseUrl | quote }}
  ACCESSIQ_VERSION: {{ .Values.release.version | quote }}
  ACCESSIQ_ENVIRONMENT: {{ .Values.release.environment | quote }}
  ACCESSIQ_GIT_SHA: {{ .Values.release.gitSha | quote }}
  ACCESSIQ_GIT_TAG: {{ .Values.release.gitTag | quote }}
  ACCESSIQ_BUILD_TIMESTAMP: {{ .Values.release.buildTimestamp | quote }}
  ACCESSIQ_DOCKER_IMAGE: {{ default (printf "%s:%s" .Values.backend.image.repository .Values.backend.image.tag) .Values.release.dockerImage | quote }}
  ACCESSIQ_IMAGE_DIGEST: {{ .Values.release.imageDigest | quote }}
  ACCESSIQ_HELM_CHART_VERSION: {{ default .Chart.Version .Values.release.helmChartVersion | quote }}
  ACCESSIQ_HELM_REVISION: {{ default .Release.Revision .Values.release.helmRevision | quote }}
  ACCESSIQ_TERRAFORM_VERSION: {{ .Values.release.terraformVersion | quote }}
  ACCESSIQ_DEPLOYMENT_OPERATOR: {{ .Values.release.operator | quote }}
  ACCESSIQ_DEPLOYMENT_STATUS: {{ .Values.release.status | quote }}
  ACCESSIQ_DEPLOYED_AT: {{ .Values.release.deployedAt | quote }}
