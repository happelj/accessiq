{{- if not .Values.backend.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "accessiq.backendSecretName" . }}
  namespace: {{ include "accessiq.namespace" . }}
  labels:
    {{- include "accessiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  {{ .Values.backend.secrets.keys.databaseUrl }}: {{ include "accessiq.databaseUrl" . | quote }}
  {{ .Values.backend.secrets.keys.jwtSecret }}: {{ .Values.backend.secrets.jwtSecret | quote }}
  {{ .Values.backend.secrets.keys.openaiApiKey }}: {{ .Values.backend.secrets.openaiApiKey | quote }}
  {{ .Values.backend.secrets.keys.anthropicApiKey }}: {{ .Values.backend.secrets.anthropicApiKey | quote }}
{{- end }}

