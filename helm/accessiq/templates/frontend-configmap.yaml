apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "accessiq.frontendConfigMapName" . }}
  namespace: {{ include "accessiq.namespace" . }}
  labels:
    {{- include "accessiq.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  VITE_API_BASE_URL: {{ .Values.frontend.apiBaseUrl | quote }}

