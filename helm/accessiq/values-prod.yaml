namespace:
  create: false
  name: accessiq

backend:
  replicaCount: 2
  image:
    repository: ghcr.io/happelj/accessiq-api
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  config:
    corsAllowedOrigins: https://accessiq.example.com
    accessiqLogLevel: INFO
  secrets:
    jwtSecret: replace-with-external-secret-or-sealed-secret
    openaiApiKey: ""
    anthropicApiKey: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

frontend:
  replicaCount: 2
  image:
    repository: ghcr.io/happelj/accessiq-frontend
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  apiBaseUrl: https://accessiq.example.com
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  external:
    url: postgresql+psycopg://accessiq:replace-me@postgres.example.com:5432/accessiq
  internal:
    enabled: false

ingress:
  enabled: true
  className: nginx
  host: accessiq.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  tls:
    - secretName: accessiq-tls
      hosts:
        - accessiq.example.com

